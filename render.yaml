services:
  # ── Web 服务 ──
  - type: web
    name: stock-analyzer
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python web_app.py
    plan: free
    envVars:
      - key: TUSHARE_TOKEN
        sync: false
      - key: TUSHARE_API_URL
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: BARK_KEY
        sync: false
      - key: WECHAT_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11"

  # ── 定时任务：每日 18:00 自动分析 ──
  - type: cron
    name: daily-analysis
    env: python
    region: singapore
    schedule: "0 10 * * 1-5"             # 北京时间 18:00 (UTC 10:00)
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py --skip-intraday && python generate_dashboard.py
    plan: free
    envVars:
      - key: TUSHARE_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: WARNING
      - key: PYTHON_VERSION
        value: "3.11"
